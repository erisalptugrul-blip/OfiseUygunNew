<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 110" width="240" height="110">
  <defs>
    <linearGradient id="masGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#004080"/>
      <stop offset="100%" style="stop-color:#002255"/>
    </linearGradient>
  </defs>
  <rect width="240" height="110" rx="10" fill="#fff"/>
  <!-- Top half blue -->
  <rect width="240" height="55" rx="0" fill="url(#masGrad)"/>
  <rect width="240" height="55" rx="10" fill="url(#masGrad)"/>
  <!-- MAS text white on blue -->
  <text x="120" y="44" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" fill="#fff" text-anchor="middle" letter-spacing="8">MAS</text>
  <!-- Tagline on white -->
  <text x="120" y="82" font-family="Arial, sans-serif" font-size="11" fill="#003369" text-anchor="middle" letter-spacing="2" font-weight="600">OFİS MALZEMELERİ</text>
</svg>
