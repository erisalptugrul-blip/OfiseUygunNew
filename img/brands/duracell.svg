  <!-- Duracell text -->
  <text x="95" y="66" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="900" fill="#fff" text-anchor="middle" letter-spacing="1">Duracell</text>
  <!-- Tagline -->
  <text x="95" y="84" font-family="Arial, sans-serif" font-size="9" fill="#C8860A" text-anchor="middle" letter-spacing="1">TRUSTED EVERYWHERE</text>
</svg>
