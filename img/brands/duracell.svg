<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 110" width="240" height="110">
  <defs>
    <linearGradient id="durGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A1A1A"/>
      <stop offset="60%" style="stop-color:#1A1A1A"/>
      <stop offset="100%" style="stop-color:#C8860A"/>
    </linearGradient>
  </defs>
  <rect width="240" height="110" rx="10" fill="#1A1A1A"/>
  <!-- Copper accent bar right -->
  <rect x="195" y="0" width="45" height="110" rx="0" fill="#C8860A"/>
  <rect x="195" y="0" width="45" height="110" rx="10" fill="#C8860A"/>
  <!-- Battery icon on copper area -->
  <rect x="204" y="38" width="22" height="14" rx="2" fill="#1A1A1A"/>
  <rect x="208" y="34" width="8" height="4" rx="1" fill="#1A1A1A"/>
  <rect x="207" y="40" width="4" height="10" rx="1" fill="#C8860A"/>
